pipelines:
  chain_mp3j1cgn:
    name: Code Pipeline
    description: 'Sequential: plan → implement → review with quality gate'
    tasks:
      - id: plan
        name: Planning
        agent: orchestrator
        input: Analyse the goal and produce a detailed implementation plan.
        dependsOn: []
      - id: implement
        name: Implementation
        agent:
          - coder
          - jyzo87
        input: Implement the solution according to the plan.
        dependsOn:
          - plan
      - id: review
        name: Code Review
        agent: decider
        input: 综合多个worker的输出，然后总结给出最佳方案
        dependsOn:
          - implement
    decisions: []

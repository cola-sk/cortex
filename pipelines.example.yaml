# Cortex Pipelines Configuration Template
# Copy this file to pipelines.yaml and customise the pipelines.
#
# Pipeline structure:
#   Each pipeline has a list of tasks executed by agents.
#   Tasks can run in parallel or sequentially (via dependsOn).
#   Decisions are optional quality gates that can trigger retries.
#
# Agent keys must match entries in your agents.yaml.
#
# ── gitDiff ─────────────────────────────────────────────────────────────────
# When using API-based models (non-CLI), set gitDiff: true to have the runner
# automatically inject `git diff HEAD` output into the prompt.
# This lets API models review your local changes without filesystem access.
#
#   - id: review
#     agent: reviewer          # API model
#     gitDiff: true            # injects current staged + unstaged diff
#
# ── workspace ──────────────────────────────────────────────────────────────
# Set workspace at the pipeline level to control where CLI agents execute
# and where gitDiff runs. All CLI agents in the pipeline will use this as cwd.
# API-only agents are unaffected.
#
#   my_pipeline:
#     name: My Pipeline
#     workspace: /path/to/target/project
#
# Recommended workflow design:
#   - API model for planning  (no file access needed)
#   - CLI agent for coding    (has native filesystem access via tools)
#   - API model for review    (use gitDiff to see what changed)

pipelines:

  # ── Simple Chain: plan → implement → review ─────────────────────────────────
  code_pipeline:
    name: Code Pipeline
    description: "Sequential: plan → implement → review with quality gate"
    tasks:
      - id: plan
        name: Planning
        agent: orchestrator    # API model — no file access needed for planning
        input: Analyse the goal and produce a detailed implementation plan.
        dependsOn: []

      - id: implement
        name: Implementation
        agent: coder            # CLI agent — has full filesystem access via tools
        input: Implement the solution according to the plan.
        dependsOn:
          - plan

      - id: review
        name: Code Review
        agent: decider
        input: Review all worker outputs and summarise the best solution.
        dependsOn:
          - implement
    decisions: []

  # ── Research & Write pipeline ────────────────────────────────────────────────
  research_pipeline:
    name: Research Pipeline
    description: "Research a topic, analyse findings, write a report"
    tasks:
      - id: research
        name: Research
        agent: analyst
        input: Research the topic thoroughly and collect key facts and data.
        dependsOn: []

      - id: analyse
        name: Analysis
        agent: analyst
        input: Analyse the research findings and identify key insights.
        dependsOn:
          - research

      - id: write
        name: Write Report
        agent: writer
        input: Write a clear, structured report based on the analysis.
        dependsOn:
          - analyse

      - id: review
        name: Quality Check
        agent: decider
        input: Verify the report is accurate, complete, and well-structured.
        dependsOn:
          - write
    decisions: []

  # ── Parallel workers with quality gate ──────────────────────────────────────
  parallel_pipeline:
    name: Parallel Pipeline
    description: "Multiple workers tackle a task simultaneously, decider picks the best"
    tasks:
      - id: execute
        name: Parallel Execution
        agent:
          - coder
          - coder         # Two instances of the same agent for different approaches
        input: Solve the problem using your preferred approach.
        dependsOn: []

      - id: evaluate
        name: Evaluation
        agent: decider
        input: Compare all solutions and select the most correct and efficient one.
        dependsOn:
          - execute
    decisions: []

  # ── Full cycle with retry decisions ─────────────────────────────────────────
  full_pipeline:
    name: Full Pipeline
    description: "Plan → implement → test, with automatic retry on quality failure"
    tasks:
      - id: plan
        name: Planning
        agent: orchestrator
        input: Break down the goal into implementation and testing tasks.
        dependsOn: []

      - id: implement
        name: Implementation
        agent: coder
        input: Write the implementation according to the plan.
        dependsOn:
          - plan

      - id: test
        name: Testing
        agent: coder
        input: Write tests for the implementation and verify correctness.
        dependsOn:
          - implement

      - id: document
        name: Documentation
        agent: writer
        input: Write clear documentation for the implementation.
        dependsOn:
          - implement
    decisions:
      - id: quality_check
        name: Quality Gate
        agent: decider
        evaluates:
          - implement
          - test
        maxRetries: 2

  # ── Local code review with API model (gitDiff + workspace example) ─────────
  local_review_pipeline:
    name: Local Code Review
    description: "CLI agent codes in target project, API model reviews git diff"
    workspace: /path/to/your/project    # All CLI agents run here; gitDiff runs here
    tasks:
      - id: implement
        name: Implementation
        agent: coder            # CLI agent — runs in workspace directory
        input: Implement the requested changes.
        dependsOn: []

      - id: review
        name: Code Review
        agent: reviewer         # API model — gitDiff injects diff into prompt
        input: |
          Review the provided git diff for correctness, potential bugs,
          and code quality issues. Be specific about file names and line numbers.
        dependsOn:
          - implement
        gitDiff: true           # Injects `git diff HEAD` from workspace
    decisions: []

  # ── Business Dev-Review-Optimize Chain ──────────────────────────────────────
  dev_review_optimize_pipeline:
    name: 业务开发-评审-优化工作流
    description: "开发项目标准流：1.开发 ➜ 2.增量代码评审与方案输出 ➜ 3.执行优化方案"
    workspace: /path/to/your/project
    tasks:
      - id: develop
        name: "业务需求开发"
        agent: coder
        input: |
          请在当前项目中开发以下业务需求：
          [请在此处输入您的具体需求...]
        dependsOn: []
        requiresReview: true
        gitDiff: false

      - id: review
        name: "代码评审与重构方案"
        agent: reviewer
        input: |
          请对上一个步骤 'develop' 提交的代码进行全方位的评审（请阅读下方的 Git Diff）。
          分析其代码质量、安全隐患和性能瓶颈。
          最终请输出一份清晰的重构与优化方案（包括安全加固和性能优化清单），供下一步骤直接参考执行。
        dependsOn:
          - develop
        gitDiff: true
        requiresReview: false

      - id: optimize
        name: "执行评审优化方案"
        agent: coder
        input: |
          请认真阅读上一步 'review' 输出的“优化方案列表”以及“重构建议”。
          对照工作区内的实际代码，把所有的重构与安全加固建议全部实施到项目中。
          修改完成后，请再次运行测试套件，确保优化没有破坏原有的业务逻辑。
        dependsOn:
          - review
        requiresReview: true
        gitDiff: false
    decisions: []
